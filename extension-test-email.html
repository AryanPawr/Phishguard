<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhishGuard Extension Test Email</title>
    <style>
      body {
        margin: 0;
        background: #f5f5f5;
        color: #171717;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 760px;
        margin: 48px auto;
        background: white;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        padding: 28px;
      }
      .meta {
        border-bottom: 1px solid #e5e5e5;
        margin-bottom: 20px;
        padding-bottom: 16px;
      }
      a {
        color: #0f766e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main role="main">
      <article>
        <div class="meta">
          <p>From: PayPal Support &lt;security@paypa1-secure.click&gt;</p>
          <p>To: demo@example.com</p>
          <p>Subject: Urgent: verify your account</p>
        </div>
        <p>Hello,</p>
        <p>
          Your account has been suspended. Sign in to verify your account
          immediately or access will be permanently limited.
        </p>
        <p>
          Continue here:
          <a href="https://paypa1-secure.click/login?session=%7Bsecure%7D%252Fverify">paypal.com</a>
        </p>
      </article>
    </main>
  </body>
</html>
