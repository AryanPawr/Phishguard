services:
  backend:
    build:
      context: ../backend
    environment:
      PHISHGUARD_ENVIRONMENT: production
      PHISHGUARD_DATABASE_URL: sqlite:////data/phishguard.db
      PHISHGUARD_JWT_SECRET: change-me-with-a-long-random-secret
      PHISHGUARD_ADMIN_USERNAME: admin
      PHISHGUARD_ADMIN_PASSWORD: change-me
      PHISHGUARD_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data

  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PHISHGUARD_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ../dashboard:/app
    depends_on:
      - backend

volumes:
  backend-data:

