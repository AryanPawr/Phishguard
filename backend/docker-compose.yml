services:
  backend:
    build: .
    environment:
      PHISHGUARD_ENVIRONMENT: production
      PHISHGUARD_DATABASE_URL: sqlite:////data/phishguard.db
      PHISHGUARD_JWT_SECRET: change-me-with-a-long-random-secret
      PHISHGUARD_ADMIN_USERNAME: admin
      PHISHGUARD_ADMIN_PASSWORD: change-me
      PHISHGUARD_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - phishguard-data:/data

volumes:
  phishguard-data:

